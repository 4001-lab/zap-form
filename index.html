<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="card">
      <h1>Get in Touch</h1>
      <p class="subtitle">We'll get back to you within 24 hours.</p>

      <form id="contact-form" novalidate>
        <div class="field">
          <label for="name">Full Name</label>
          <input type="text" id="name" placeholder="Jane Doe" required />
        </div>

        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="jane@example.com" required />
        </div>

        <div class="field">
          <label for="message">Message</label>
          <textarea id="message" rows="4" placeholder="How can we help?" required></textarea>
        </div>

        <button type="submit" id="submit-btn">Send Message</button>

        <p id="status" class="status" aria-live="polite"></p>
      </form>
    </div>

    <script src="script.js"></script>
  </body>
</html>
